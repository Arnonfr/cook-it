name: React Native — Build & Firebase Distribution

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (Hebrew)'
        required: false
        default: ''

jobs:
  build-and-distribute:
    name: Build APK & Distribute
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js (no lock file cache — first run generates it) ────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ─── Cache node_modules by package.json hash ──────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-${{ hashFiles('mobile/package.json') }}
          restore-keys: ${{ runner.os }}-mobile-

      # ─── Java (Android build) ──────────────────────────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ─── Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── Install deps ──────────────────────────────────────────────────────
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      # ─── Fix Expo package versions to match installed SDK ──────────────────
      - name: Fix Expo package versions
        working-directory: mobile
        run: npx expo install --fix
        env:
          EXPO_NO_TELEMETRY: 1

      # ─── Expo Prebuild ─────────────────────────────────────────────────────
      - name: Expo prebuild (generate Android project)
        working-directory: mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ─── Pin Gradle 8.8 (RN 0.76.x compat — 8.10.x breaks components.release)─
      - name: Patch Gradle wrapper to 8.8
        run: |
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.8-all.zip\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' \
            > mobile/android/gradle/wrapper/gradle-wrapper.properties

      # ─── Bundle JS into debug APK (no Metro needed at runtime) ────────────
      - name: Enable JS bundle in debug APK
        run: |
          echo "" >> mobile/android/gradle.properties
          echo "# Bundle JS in debug so APK works without Metro bundler" >> mobile/android/gradle.properties
          echo "BUNDLE_IN_DEBUG=true" >> mobile/android/gradle.properties
          echo "DEV=false" >> mobile/android/gradle.properties

      # ─── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-8.8-rn76
          restore-keys: ${{ runner.os }}-gradle-8.8-

      # ─── Gradle build ──────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      # ─── Verify ────────────────────────────────────────────────────────────
      - name: Verify APK
        run: |
          ls -lh mobile/android/app/build/outputs/apk/debug/
          file mobile/android/app/build/outputs/apk/debug/app-debug.apk

      # ─── Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cookit-rn-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ─── Firebase App Distribution ─────────────────────────────────────────
      - name: Distribute to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            ${{ inputs.release_notes != '' && inputs.release_notes || format('CookIt RN v1.2.0 — Build #{0}', github.run_number) }}

            🚀 React Native — אפליקציה בנויה מחדש:
            - חיפוש מיידי עם debounce 280ms
            - cache מלא — FlashList + React Query
            - RTL נייטיב + פונט Noto Sans Hebrew
            - Skeleton loaders במקום ספינרים
            - Prefetch של מתכון בלחיצה

            Commit: ${{ github.sha }}

  # ─── Release build (on git tag) ──────────────────────────────────────────
  build-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-${{ hashFiles('mobile/package.json') }}
          restore-keys: ${{ runner.os }}-mobile-

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: cookit-rn-release-${{ github.ref_name }}
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Distribute release to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: ${{ steps.sign_app.outputs.signedReleaseFile }}
          releaseNotes: "CookIt RN Release ${{ github.ref_name }}"
