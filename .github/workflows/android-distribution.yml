name: Build, Test & Distribute Android App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Native Dependencies
        working-directory: ./cookit-native
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: ./cookit-native
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('cookit-native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: ./cookit-native/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Sign APK with CI keystore
        run: |
          SOURCE_APK=$(find cookit-native/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Source APK: $SOURCE_APK"

          keytool -genkey -v \
            -keystore /tmp/cookit-ci.keystore \
            -alias cookit \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass cookit123 -keypass cookit123 \
            -dname "CN=CookIt CI,O=CookIt,C=IL"

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          $BUILD_TOOLS/zipalign -v 4 "$SOURCE_APK" /tmp/app-aligned.apk || cp "$SOURCE_APK" /tmp/app-aligned.apk

          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/cookit-ci.keystore \
            --ks-pass pass:cookit123 \
            --key-pass pass:cookit123 \
            --ks-key-alias cookit \
            --out cookit-native/android/app/build/outputs/apk/release/app-release-signed.apk \
            /tmp/app-aligned.apk

          echo "✅ Signed APK:"
          ls -lh cookit-native/android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cookit-rn-build-${{ github.run_number }}
          path: cookit-native/android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 14

      # Firebase Distribution
      - name: Distribute to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: cookit-native/android/app/build/outputs/apk/release/app-release-signed.apk
          releaseNotes: |
            CookIt Native (React Native) — Build ${{ github.run_number }}

            ✨ חדש:
            - פיתוח ב-React Native לביצועים מרביים
            - UI חדש עם חיפוש מיידי ו-debounce
            - שמירת מתכונים מקומית מהירה (MMKV)
            - תמיכה מובנית ב-Share Intents
            - RTL נייטיב + פונט Noto Sans Hebrew

            Commit: ${{ github.sha }}

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Native Dependencies
        working-directory: ./cookit-native
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: ./cookit-native
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('cookit-native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: ./cookit-native/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: cookit-native/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: cookit-rn-release-${{ github.ref_name }}
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Distribute Release to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: ${{ steps.sign_app.outputs.signedReleaseFile }}
          releaseNotes: "CookIt Native Release ${{ github.ref_name }}"
