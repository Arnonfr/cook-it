name: Build, Test & Distribute Android App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://cook-it-29ua.onrender.com/api

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Run Unit Tests
        working-directory: ./frontend/android
        run: ./gradlew testDebugUnitTest --continue || true

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Verify APK
        run: |
          ls -lh frontend/android/app/build/outputs/apk/debug/
          file frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      # Firebase Distribution
      - name: Setup Firebase CLI
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: npm install -g firebase-tools

      - name: Distribute to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "⚠️ FIREBASE_TOKEN not set. Skipping Firebase distribution."
            echo "To enable Firebase distribution, add FIREBASE_TOKEN to GitHub Secrets."
            echo "Get token by running: firebase login:ci"
            exit 0
          fi
          
          echo "🚀 Distributing to Firebase..."
          firebase appdistribution:distribute \
            frontend/android/app/build/outputs/apk/debug/app-debug.apk \
            --app "1:629153402724:android:fb933cd078c975a42c3471" \
            --groups "testers" \
            --release-notes "CookIt Build ${{ github.run_number }} - $(date +%Y-%m-%d)"

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://cook-it-29ua.onrender.com/api

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Build Release APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: frontend/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute Release to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "⚠️ FIREBASE_TOKEN not set. Skipping Firebase distribution."
            exit 0
          fi
          
          firebase appdistribution:distribute \
            ${{ steps.sign_app.outputs.signedReleaseFile }} \
            --app "1:629153402724:android:fb933cd078c975a42c3471" \
            --groups "testers" \
            --release-notes "🎉 CookIt Release ${{ github.ref_name }}"
