name: Build, Test & Distribute Android App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cookit-native/package-lock.json

      - name: Install Native Dependencies
        working-directory: ./cookit-native
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: ./cookit-native
        run: npx expo prebuild --platform android

      - name: Build Release APK
        working-directory: ./cookit-native/android
        run: ./gradlew assembleRelease

      - name: Verify APK
        run: |
          ls -lh cookit-native/android/app/build/outputs/apk/release/
          file cookit-native/android/app/build/outputs/apk/release/app-release-unsigned.apk || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: cookit-native/android/app/build/outputs/apk/release/*.apk

      # Firebase Distribution
      - name: Distribute to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: cookit-native/android/app/build/outputs/apk/release/app-release-unsigned.apk
          releaseNotes: |
            CookIt Native App (React Native Preview) — Build ${{ github.run_number }}

            ✨ חדש:
            - פיתוח ב-React Native לביצועים מרביים (גרסת בטא ראשונה)
            - UI חדש ומרענן בעל חוויית משתמש חלקה
            - תמיכה מובנית ב-Share Intents של המערכת
            - חיפוש מהיר וחלק

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cookit-native/package-lock.json

      - name: Install Native Dependencies
        working-directory: ./cookit-native
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: ./cookit-native
        run: npx expo prebuild --platform android

      - name: Build Release APK
        working-directory: ./cookit-native/android
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: cookit-native/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Distribute Release to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: ${{ steps.sign_app.outputs.signedReleaseFile }}
          releaseNotes: "CookIt Native Release ${{ github.ref_name }}"
