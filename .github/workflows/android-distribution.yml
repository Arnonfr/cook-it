name: Build, Test & Distribute Android App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Setup Backend Environment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          cd backend
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "SERPER_API_KEY=$SERPER_API_KEY" >> .env
          echo "PORT=3001" >> .env

      - name: Run Unit Tests
        working-directory: ./frontend/android
        run: ./gradlew testDebugUnitTest --continue || echo "Tests completed with issues"

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Verify APK
        run: |
          ls -la frontend/android/app/build/outputs/apk/debug/
          file frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      # Firebase Distribution - Try multiple methods
      - name: Distribute to Firebase
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "🚀 Starting Firebase Distribution..."
          
          # Install Firebase CLI
          npm install -g firebase-tools
          
          # Method 1: Try using FIREBASE_TOKEN (legacy but simpler)
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN method..."
            firebase appdistribution:distribute \
              frontend/android/app/build/outputs/apk/debug/app-debug.apk \
              --app "1:629153402724:android:fb933cd078c975a42c3471" \
              --groups "testers" \
              --release-notes "CookIt Build ${{ github.run_number }} - $(date)"
          # Method 2: Try using Service Account JSON file
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Using Service Account method..."
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json
            firebase appdistribution:distribute \
              frontend/android/app/build/outputs/apk/debug/app-debug.apk \
              --app "1:629153402724:android:fb933cd078c975a42c3471" \
              --groups "testers" \
              --release-notes "CookIt Build ${{ github.run_number }}"
          else
            echo "⚠️ No Firebase credentials found. Skipping distribution."
            echo "Please set either FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT in GitHub Secrets."
            exit 0
          fi

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Build Release APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: frontend/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Distribute Release to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install -g firebase-tools
          
          if [ -n "$FIREBASE_TOKEN" ]; then
            firebase appdistribution:distribute \
              ${{ steps.sign_app.outputs.signedReleaseFile }} \
              --app "1:629153402724:android:fb933cd078c975a42c3471" \
              --groups "testers" \
              --release-notes "🎉 CookIt Release ${{ github.ref_name }}"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-service-account.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json
            firebase appdistribution:distribute \
              ${{ steps.sign_app.outputs.signedReleaseFile }} \
              --app "1:629153402724:android:fb933cd078c975a42c3471" \
              --groups "testers" \
              --release-notes "🎉 CookIt Release ${{ github.ref_name }}"
          else
            echo "⚠️ No Firebase credentials found."
            exit 0
          fi
