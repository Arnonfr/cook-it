name: Build, Test & Distribute Android App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Manual trigger

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # Setup Android SDK with emulator
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install Android emulator
      - name: Install Android Emulator
        run: |
          echo "Installing Android emulator..."
          sdkmanager "system-images;android-34;google_apis;x86_64" "emulator" "platform-tools"
          echo "y" | sdkmanager --licenses

      # Setup Node.js for frontend build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Start Backend Server
      - name: Start Backend Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          cd backend
          npm ci
          # Create .env file with secrets
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "SERPER_API_KEY=$SERPER_API_KEY" >> .env
          echo "PORT=3001" >> .env
          # Start server in background
          npm run dev &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          sleep 5
          curl --retry 5 --retry-delay 2 http://localhost:3001/api || (echo "Backend failed to start"; exit 1)
          echo "✅ Backend server is running"

      # Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      # Build frontend
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # Sync Capacitor
      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      # Setup Firebase configuration
      - name: Setup Firebase
        run: |
          chmod +x .github/workflows/scripts/setup-firebase.sh
          .github/workflows/scripts/setup-firebase.sh '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      # Build Android Debug APK
      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      # Run Unit Tests
      - name: Run Unit Tests
        working-directory: ./frontend/android
        run: ./gradlew testDebugUnitTest --continue || true

      # Start Emulator and Run E2E Tests
      - name: Start Emulator & Run Tests
        timeout-minutes: 20
        run: |
          echo "🚀 Setting up Android emulator..."
          
          # Create emulator
          echo "no" | avdmanager create avd -n test_emulator -k "system-images;android-34;google_apis;x86_64" --force
          
          # Start emulator in background
          emulator -avd test_emulator -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim &
          EMULATOR_PID=$!
          
          # Wait for emulator to boot
          echo "⏳ Waiting for emulator to boot..."
          n=0
          while [ $n -lt 300 ]; do
            if adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator is ready!"
              break
            fi
            n=$((n + 1))
            sleep 1
          done
          
          if [ $n -ge 300 ]; then
            echo "❌ Emulator failed to boot within 5 minutes"
            exit 1
          fi
          
          # Show emulator info
          adb devices
          adb shell input keyevent 82 # Unlock screen
          
          echo "🧪 Running smoke tests..."
          
          # Install APK
          adb install -r frontend/android/app/build/outputs/apk/debug/app-debug.apk
          
          # Start app
          adb shell am start -n com.cookit.app/.MainActivity
          sleep 5
          
          # Test 1: App launched successfully
          if adb shell pidof com.cookit.app > /dev/null; then
            echo "✅ Test 1 PASSED: App launched successfully"
          else
            echo "❌ Test 1 FAILED: App did not launch"
            exit 1
          fi
          
          # Test 2: Check WebView is loaded
          sleep 3
          if adb shell dumpsys webviewupdate | grep -q "com.cookit.app"; then
            echo "✅ Test 2 PASSED: WebView loaded"
          else
            echo "⚠️ Test 2: WebView check inconclusive (continuing)"
          fi
          
          # Test 3: Simulate search action
          echo "🔍 Testing search functionality..."
          adb shell input tap 540 400 # Tap on search area (approximate)
          sleep 1
          adb shell input text "pasta"
          sleep 1
          adb shell input keyevent 66 # Enter key
          sleep 3
          echo "✅ Test 3 COMPLETED: Search interaction performed"
          
          # Test 4: Backend connectivity check
          echo "🌐 Testing backend connectivity..."
          if curl -s http://localhost:3001/api/health | grep -q "ok"; then
            echo "✅ Test 4 PASSED: Backend is accessible"
          else
            echo "⚠️ Test 4: Backend health check failed"
          fi
          
          # Take screenshot for verification
          adb shell screencap -p /data/local/tmp/screen.png
          adb pull /data/local/tmp/screen.png test_screenshot.png
          
          echo "📸 Screenshot saved for verification"
          
          # Stop emulator
          adb emu kill || true
          kill $EMULATOR_PID 2>/dev/null || true
          
          echo "✅ All emulator tests completed!"

      # Upload test artifacts
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test_screenshot.png
            frontend/android/app/build/reports/

      # Upload APK as artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      # Distribute to Firebase App Distribution (only if tests pass and on main branch)
      - name: Distribute to Firebase
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && success()
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            ✅ Build: ${{ github.run_number }}
            ✅ All emulator tests passed
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Message: ${{ github.event.head_commit.message }}

      # Stop Backend Server
      - name: Stop Backend Server
        if: always()
        run: |
          if [ -n "$BACKEND_PID" ]; then
            kill $BACKEND_PID 2>/dev/null || true
            echo "Backend server stopped"
          fi

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only on version tags
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      # Build Release APK (requires signing)
      - name: Build Release APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease

      # Sign Release APK
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: frontend/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # Upload Signed APK
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      # Distribute Release to Firebase
      - name: Distribute Release to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:629153402724:android:fb933cd078c975a42c3471
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: arnon7700@gmail.com
          file: ${{ steps.sign_app.outputs.signedReleaseFile }}
          releaseNotes: |
            🎉 Release ${{ github.ref_name }}
            
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            
            Changes:
            ${{ github.event.head_commit.message }}
