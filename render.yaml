services:
  - type: web
    name: cookit-api
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cookit-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: cookit-db
    databaseName: cookit
    user: cookit
    plan: free
