# CookIt Backend Deployment Configuration
#
# ⚠️ חשוב: אל תכניס API Keys לקובץ זה!
# הוסף אותם ב-Render Dashboard → Environment Variables
#
# המפתחות שצריך להוסיף ידנית:
# - GEMINI_API_KEY
# - SERPER_API_KEY
# - DATABASE_URL   (מ-Neon — pooled connection)
# - DIRECT_URL     (מ-Neon — direct connection)

services:
  - type: web
    name: cookit-api
    runtime: node
    region: frankfurt
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ⚠️ הוסף ב-Dashboard ידנית:
      # DATABASE_URL  — Neon pooled URL (postgres://...?pgbouncer=true&sslmode=require)
      # DIRECT_URL    — Neon direct URL  (postgres://...?sslmode=require)
      # GEMINI_API_KEY
      # SERPER_API_KEY
