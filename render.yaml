# CookIt Backend Deployment Configuration
# 
# ⚠️ חשוב: אל תכניס API Keys לקובץ זה!
# הוסף אותם ב-Render Dashboard → Environment Variables
#
# המפתחות שצריך להוסיף ידנית:
# - GEMINI_API_KEY: המפתח מ-Google AI Studio
# - SERPER_API_KEY: המפתח מ-Serper.dev
#
# הוראות מלאות בקובץ: DEPLOY_SIMPLE.md

services:
  - type: web
    name: cookit-api
    runtime: node
    region: frankfurt
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cookit-db
          property: connectionString
      # ⚠️ הוסף ב-Dashboard ידנית: GEMINI_API_KEY
      # ⚠️ הוסף ב-Dashboard ידנית: SERPER_API_KEY
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: cookit-db
    databaseName: cookit
    user: cookit
    plan: free
